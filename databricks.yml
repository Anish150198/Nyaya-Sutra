# This is a Databricks asset bundle definition for test.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: test
  uuid: 16ad467c-26ad-400c-9c0e-9de6781e7493

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-30a69397-9270.cloud.databricks.com
    variables:
      catalog: workspace
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-30a69397-9270.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/akashmaji@iisc.ac.in to make sure we only have a single copy.
      root_path: /Workspace/Users/akashmaji@iisc.ac.in/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: akashmaji@iisc.ac.in
        level: CAN_MANAGE
