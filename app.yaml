command:
  - "streamlit"
  - "run"
  - "app/main.py"

env:
  - name: 'NYAYA_ENV'
    value: 'databricks'
  - name: 'NYAYA_DATA_ROOT'
    value: '/Volumes/workspace/default/tes/data'
  - name: 'DATABRICKS_CATALOG'
    value: 'workspace'
  - name: 'DATABRICKS_SCHEMA'
    value: 'default'
  - name: 'VECTOR_DB'
    value: 'databricks_vs'
  - name: 'LLM_PROVIDER'
    value: 'openai'
  - name: 'OPENAI_API_KEY'
    value: ''
  - name: 'OPENAI_MODEL'
    value: 'gpt-4o-mini'
  - name: 'EMBEDDING_PROVIDER'
    value: 'openai'
  - name: 'OPENAI_EMBEDDING_MODEL'
    value: 'text-embedding-3-small'
  - name: 'MAX_OUTPUT_TOKENS'
    value: '1024'
  - name: 'LLM_TEMPERATURE'
    value: '0.3'
  - name: 'TOP_K_RETRIEVAL'
    value: '5'
  - name: 'CHUNK_SIZE'
    value: '800'
  - name: 'CHUNK_OVERLAP'
    value: '150'
  - name: 'DATABRICKS_HOST'
    value: 'https://dbc-30a69397-9270.cloud.databricks.com'
  - name: 'DATABRICKS_TOKEN'
    value: ''
  - name: 'DATABRICKS_CATALOG'
    value: 'main'
  - name: 'DATABRICKS_SCHEMA'
    value: 'nyaya'
  - name: 'VS_ENDPOINT_NAME'
    value: 'nyaya_vs_endpoint'
  - name: 'VS_INDEX_NAME'
    value: 'main.default.gold_vs_index'
  - name: 'VS_SOURCE_TABLE'
    value: 'main.nyaya.gold_law_embeddings'
  - name: 'VS_EMBEDDING_DIM'
    value: '1536'
  - name: 'MLFLOW_TRACKING_URI'
    value: 'databricks'
  - name: 'MLFLOW_EXPERIMENT_NAME'
    value: '/nyaya-sahayak'
  - name: 'STREAMLIT_GATHER_USAGE_STATS'
    value: 'false'
  - name: 'CATALOG'
